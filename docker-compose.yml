

services:
  web:
    build: .
    container_name: symfony_php_cours_web
    ports:
      - "9000:8000"
      - "9443:443"
      - "8080:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - db
    networks:
      - symfony_cours_network
  # MariaDB
  db:
    image: mariadb:latest
    container_name: symfony_php_cours_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: symfony_cours
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - symfony_cours_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: symfony_php_cours_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - symfony_cours_network

  mailpit:
    image: axllent/mailpit
    container_name: symfony_php_cours_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"    # Web UI
      - "1025:1025"    # SMTP
    networks:
      - symfony_cours_network

networks:
  symfony_cours_network:
    driver: bridge

volumes:
  symfony_cache:
  db_data:
